services:
  postgres:
    image: postgres:17-alpine
    container_name: mentor-esgi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mentor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mentor}
      POSTGRES_DB: ${POSTGRES_DB:-mentor_esgi}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mentor} -d ${POSTGRES_DB:-mentor_esgi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentor-esgi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
